name: Build and Deploy Frontend Preview 

on:
  push:
    branches:
      - feat/preview
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            lowercase=true
          tags: |
            type=sha,prefix=preview-,format=short

      - name: Build and push docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=https://soroutetion.com/api

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/feat/preview'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tailscale
        if: ${{ !env.ACT }}
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_OAUTH_SECRET }}

      # - name: Install kubectl
      #   uses: azure/setup-kubectl@v4
      #   with:
      #     version: "latest" 

      - name: Setup kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ github.repository }}:${{ needs.build.outputs.image_tag }}"
          IMAGE_TAG_LOWER=$(echo "$IMAGE_TAG" | tr '[:upper:]' '[:lower:]')
          echo "Deploying unique Frontend image: $IMAGE_TAG_LOWER"
          kubectl set image deployment/rop-frontend rop-frontend=$IMAGE_TAG_LOWER -n rop
          kubectl rollout status deployment/rop-frontend -n rop --timeout=120s